
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANISHQ | Pure Gold & Diamond Jewelry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --tanishq-maroon: #631520;
      --tanishq-gold: #a68945;
      --tanishq-bg: #fdfbf7;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--tanishq-bg);
      color: #1a1a1a;
    }
    h1, h2, h3, h4, .font-serif {
      font-family: 'Playfair Display', serif;
    }
    .bg-tanishq-maroon { background-color: var(--tanishq-maroon); }
    .text-tanishq-maroon { color: var(--tanishq-maroon); }
    .border-tanishq-maroon { border-color: var(--tanishq-maroon); }
    
    .bg-tanishq-gold { background-color: var(--tanishq-gold); }
    .text-tanishq-gold { color: var(--tanishq-gold); }
    .border-tanishq-gold { border-color: var(--tanishq-gold); }
    
    .btn-luxury {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
      border-radius: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
  </style>
